<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1B2A4A">
    <meta name="description" content="Page non trouvée - Navette Express Entreprise">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Erreur | Navette Express Entreprise</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="images/logo/logo-jaebets.png">
    <link rel="apple-touch-icon" href="images/logo/logo-jaebets.png">
    
    <!-- Google Fonts Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/app.css">
</head>
<body class="page-erreur">
    
    <!-- Contenu principal -->
    <main class="erreur-content">
        
        <!-- Logo -->
        <div class="erreur-logo">
            <picture>
                <source srcset="images/logo/logo-jaebets.webp" type="image/webp">
                <img src="images/logo/logo-jaebets.png" alt="JAEBETS HOLDING" loading="lazy">
            </picture>
        </div>
        
        <!-- Illustration erreur -->
        <div class="erreur-illustration" id="erreurIllustration">
            <!-- 404 par défaut -->
            <svg class="erreur-svg" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Cercle de fond -->
                <circle cx="100" cy="100" r="80" fill="var(--fond-sombre)" stroke="var(--bleu-marine)" stroke-width="2"/>
                
                <!-- Bus stylisé -->
                <g class="bus-group">
                    <rect x="50" y="75" width="100" height="50" rx="8" fill="var(--bleu-marine)" stroke="var(--turquoise)" stroke-width="2"/>
                    <rect x="55" y="82" width="25" height="18" rx="3" fill="var(--turquoise)" opacity="0.3"/>
                    <rect x="85" y="82" width="25" height="18" rx="3" fill="var(--turquoise)" opacity="0.3"/>
                    <rect x="115" y="82" width="25" height="18" rx="3" fill="var(--turquoise)" opacity="0.3"/>
                    <circle cx="70" cy="125" r="10" fill="var(--fond-sombre)" stroke="var(--turquoise)" stroke-width="2"/>
                    <circle cx="130" cy="125" r="10" fill="var(--fond-sombre)" stroke="var(--turquoise)" stroke-width="2"/>
                    <circle cx="70" cy="125" r="5" fill="var(--turquoise)"/>
                    <circle cx="130" cy="125" r="5" fill="var(--turquoise)"/>
                </g>
                
                <!-- Point d'interrogation -->
                <g class="question-mark">
                    <circle cx="155" cy="55" r="20" fill="var(--or-premium)" opacity="0.2"/>
                    <text x="155" y="63" font-family="Montserrat, sans-serif" font-size="24" font-weight="700" fill="var(--or-premium)" text-anchor="middle">?</text>
                </g>
                
                <!-- Lignes de route -->
                <path d="M20 150 Q50 145 80 150 T140 150 T180 145" stroke="var(--turquoise)" stroke-width="2" stroke-dasharray="8 4" opacity="0.5"/>
            </svg>
        </div>
        
        <!-- Message d'erreur -->
        <div class="erreur-message">
            <h1 class="erreur-code" id="erreurCode">404</h1>
            <h2 class="erreur-titre" id="erreurTitre">Page non trouvée</h2>
            <p class="erreur-description" id="erreurDescription">
                Oups ! La page que vous recherchez semble avoir pris un autre itinéraire. 
                Elle n'existe pas ou a été déplacée.
            </p>
        </div>
        
        <!-- Actions -->
        <div class="erreur-actions">
            <a href="dashboard.html" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                Retour au Dashboard
            </a>
            <button type="button" class="btn btn-outline" onclick="history.back()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Page précédente
            </button>
        </div>
        
        <!-- Aide -->
        <div class="erreur-aide">
            <p>Besoin d'aide ?</p>
            <a href="https://wa.me/2250703285359" target="_blank" rel="noopener" class="erreur-aide-link">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                Contacter le support
            </a>
        </div>
        
    </main>
    
    <!-- Scripts -->
    <script>
        // Détection du type d'erreur via URL ou paramètres
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const typeErreur = urlParams.get('type') || '404';
            
            configurerErreur(typeErreur);
        });
        
        // Configurer l'affichage selon le type d'erreur
        function configurerErreur(type) {
            const configs = {
                '404': {
                    code: '404',
                    titre: 'Page non trouvée',
                    description: 'Oups ! La page que vous recherchez semble avoir pris un autre itinéraire. Elle n\'existe pas ou a été déplacée.'
                },
                '403': {
                    code: '403',
                    titre: 'Accès refusé',
                    description: 'Vous n\'avez pas les permissions nécessaires pour accéder à cette page. Contactez votre administrateur.'
                },
                '500': {
                    code: '500',
                    titre: 'Erreur serveur',
                    description: 'Une erreur technique s\'est produite. Nos équipes sont informées et travaillent à résoudre le problème.'
                },
                'offline': {
                    code: '📡',
                    titre: 'Hors connexion',
                    description: 'Vous semblez être hors ligne. Vérifiez votre connexion internet et réessayez.'
                },
                'maintenance': {
                    code: '🔧',
                    titre: 'Maintenance en cours',
                    description: 'L\'application est temporairement indisponible pour maintenance. Nous serons de retour très bientôt.'
                },
                'session': {
                    code: '🔒',
                    titre: 'Session expirée',
                    description: 'Votre session a expiré pour des raisons de sécurité. Veuillez vous reconnecter.'
                }
            };
            
            const config = configs[type] || configs['404'];
            
            document.getElementById('erreurCode').textContent = config.code;
            document.getElementById('erreurTitre').textContent = config.titre;
            document.getElementById('erreurDescription').textContent = config.description;
            
            // Changer l'illustration selon le type
            if (type === 'offline') {
                document.querySelector('.erreur-svg .question-mark text').textContent = '📡';
            } else if (type === 'maintenance') {
                document.querySelector('.erreur-svg .question-mark text').textContent = '🔧';
            } else if (type === 'session') {
                // Rediriger vers connexion si session expirée
                const actions = document.querySelector('.erreur-actions');
                actions.innerHTML = `
                    <a href="connexion.html" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                            <polyline points="10 17 15 12 10 7"/>
                            <line x1="15" y1="12" x2="3" y2="12"/>
                        </svg>
                        Se reconnecter
                    </a>
                `;
            }
        }
        
        // Animation légère du bus
        (function animateBus() {
            const bus = document.querySelector('.bus-group');
            if (!bus) return;
            
            let offset = 0;
            setInterval(() => {
                offset = offset === 0 ? 2 : 0;
                bus.style.transform = `translateY(${offset}px)`;
            }, 500);
        })();
    </script>
</body>
</html>
